name: build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - run: npm install -g npm@latest

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      - uses: JS-DevTools/npm-publish@v4
        with:
          access: public
